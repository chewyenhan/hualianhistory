<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全能竞技场 - 终极至尊版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: #3b82f6;
            --accent-color: #fbbf24;
            --bg-color: #f3f4f6;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--bg-color);
            transition: background 1.2s ease;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--theme-color);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .text-giant { font-size: 5rem; font-weight: 900; }
        .text-mega { font-size: 3.5rem; font-weight: 900; }
        
        .setup-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 15px;
            font-size: 1.2rem;
            outline: none;
            transition: border 0.3s;
        }
        .setup-input:focus { border-color: var(--theme-color); }

        .score-input {
            width: 80px;
            text-align: center;
            font-weight: 900;
            border: 2px solid var(--theme-color);
            border-radius: 10px;
            padding: 5px;
            font-size: 1.5rem;
        }

        .btn-primary {
            background: var(--theme-color);
            color: white;
            font-weight: 900;
            padding: 1.5rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 0 #00000022;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-primary:active { transform: translateY(4px); box-shadow: none; }

        .option-card {
            background: white;
            border: 5px solid #eee;
            border-radius: 25px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 2.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
        }
        .option-card:hover { transform: scale(1.02); border-color: var(--theme-color); }
        .option-card.correct { background: #dcfce7; border-color: #22c55e; }
        .option-card.wrong { background: #fee2e2; border-color: #ef4444; }

        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1e293b;
            color: white;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-top: 5px solid var(--theme-color);
        }

        .bonus-badge {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            color: white;
            padding: 5px 20px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 900;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading" class="fixed inset-0 bg-black/95 flex flex-col items-center justify-center text-white z-[9999] hidden text-center">
        <div class="w-32 h-32 border-8 border-yellow-500 border-t-transparent rounded-full animate-spin mb-8"></div>
        <h2 class="text-5xl font-black mb-4">智库正在极速运转...</h2>
        <p class="text-2xl opacity-70">正在分析资料、自动生成高难度挑战题</p>
    </div>

    <!-- BGM Widget -->
    <div id="bgm-widget" class="fixed top-5 right-5 bg-black/80 rounded-full p-4 text-white hidden z-[2000] flex items-center gap-4">
        <span onclick="toggleBGM()" class="cursor-pointer text-3xl">🎵</span>
        <input type="range" min="0" max="0.5" step="0.01" value="0.05" oninput="updateVolume(this.value)">
    </div>

    <!-- Step 0: Setup View -->
    <div id="setup-view" class="container mx-auto p-8 max-w-6xl">
        <h1 class="text-center text-giant mb-12" style="color: var(--theme-color)">AI 全能竞技场</h1>
        
        <div class="glass-panel p-10 space-y-10">
            <!-- API & Model -->
            <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-2xl font-bold mb-2 text-gray-700">🔑 API Key (Gemini)</label>
                    <div class="flex gap-4">
                        <input type="password" id="api-key" class="setup-input" placeholder="粘贴你的 API Key...">
                        <button onclick="fetchModels()" class="bg-blue-600 text-white px-8 rounded-xl font-bold whitespace-nowrap text-xl">检测模型</button>
                    </div>
                </div>
                <div>
                    <label class="block text-2xl font-bold mb-2 text-gray-700">🤖 选择 AI 模型</label>
                    <select id="model-select" class="setup-input text-xl font-bold"></select>
                </div>
            </section>

            <!-- Text & Count Slider -->
            <section>
                <label class="block text-2xl font-bold mb-2 text-gray-700">📖 粘贴课文/资料内容</label>
                <textarea id="source-text" class="setup-input h-64 text-lg" placeholder="在这里输入你的教学材料..."></textarea>
                <div class="mt-8 flex items-center gap-8 bg-gray-50 p-6 rounded-2xl">
                    <span class="text-2xl font-black">出题数量：</span>
                    <input type="range" id="q-count-input" min="1" max="30" value="10" class="flex-grow h-4" oninput="document.getElementById('q-count-val').innerText = this.value">
                    <span id="q-count-val" class="text-5xl font-black text-blue-600 w-20 text-center">10</span>
                </div>
            </section>

            <!-- Scoring Config -->
            <section class="p-8 bg-white border-4 border-dashed border-gray-200 rounded-3xl">
                <h3 class="text-3xl font-black mb-8 text-center text-blue-900 underline decoration-yellow-400">📊 竞技规则与计分配置</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="space-y-6">
                        <p class="text-2xl font-black text-blue-600 border-l-8 border-blue-600 pl-4">普通答题 (随机抽组/跟进组)</p>
                        <div class="flex justify-between items-center text-xl">
                            <span class="font-bold">答对加分：</span>
                            <input type="number" id="pts-correct" value="1" class="score-input">
                        </div>
                        <div class="flex justify-between items-center text-xl">
                            <span class="font-bold">答错扣分：</span>
                            <input type="number" id="pts-wrong" value="0" class="score-input">
                        </div>
                    </div>
                    <div class="space-y-6">
                        <p class="text-2xl font-black text-red-600 border-l-8 border-red-600 pl-4">抢答第一组 (手动选中的首位)</p>
                        <div class="flex justify-between items-center text-xl">
                            <span class="font-bold">答对额外加分：</span>
                            <input type="number" id="pts-first-correct" value="2" class="score-input">
                        </div>
                        <div class="flex justify-between items-center text-xl">
                            <span class="font-bold">答错惩罚扣分：</span>
                            <input type="number" id="pts-first-wrong" value="1" class="score-input">
                        </div>
                    </div>
                </div>
                <div class="mt-10 pt-6 border-t border-gray-100 flex items-center gap-6">
                    <input type="checkbox" id="bonus-enabled" class="w-8 h-8 cursor-pointer" checked>
                    <label for="bonus-enabled" class="text-2xl font-black cursor-pointer">开启决胜关：最后 3 题难度提升且积分翻倍！</label>
                </div>
            </section>

            <!-- Team Setup Slider -->
            <section class="bg-blue-50 p-8 rounded-3xl">
                <div class="flex items-center gap-8 mb-8">
                    <span class="text-2xl font-black">战队数量：</span>
                    <input type="range" id="team-count-input" min="1" max="10" value="3" class="flex-grow h-4" oninput="renderTeamSetupInputs(this.value); document.getElementById('team-count-val').innerText = this.value">
                    <span id="team-count-val" class="text-5xl font-black text-gray-800 w-20 text-center">3</span>
                </div>
                <div id="team-names-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>

            <div class="text-center pt-10">
                <button onclick="launchAI()" class="btn-primary text-5xl px-24 py-10 w-full md:w-auto shadow-2xl">🚀 启动 AI 自动出题并开启竞技</button>
            </div>
        </div>
    </div>

    <!-- Game View -->
    <div id="game-view" class="hidden p-8 animate-fade-in">
        <div id="live-scores" class="flex flex-wrap justify-center gap-6 mb-8"></div>

        <div class="glass-panel p-10 max-w-7xl mx-auto shadow-2xl bg-white/95">
            <div class="flex justify-between items-start mb-8 border-b-8 border-gray-100 pb-8">
                <div>
                    <h2 id="round-title" class="text-5xl font-black text-gray-800">第一关</h2>
                    <div class="flex items-center gap-6 mt-4">
                        <span id="round-diff" class="text-3xl text-orange-500">⭐⭐⭐</span>
                        <span id="bonus-tag" class="bonus-badge hidden">🏆 BONUS ROUND</span>
                    </div>
                </div>
                <div id="active-status" class="bg-gray-800 text-white p-6 rounded-3xl text-center min-w-[350px] shadow-xl">
                    <p class="text-lg opacity-60 font-bold mb-2">📢 正在作答战队：</p>
                    <p id="active-team-info" class="text-4xl font-black text-yellow-400">等待点选...</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
                <div class="lg:col-span-1 text-center">
                    <div id="q-emoji" class="text-[12rem] p-10 bg-white border-8 border-gray-100 rounded-[50px] shadow-2xl">🤔</div>
                </div>
                <div class="lg:col-span-3 space-y-8">
                    <div class="p-10 bg-gray-50 border-8 border-gray-200 rounded-[40px] shadow-inner">
                        <p id="q-text" class="text-mega leading-tight font-black text-gray-800"></p>
                    </div>
                    <div id="options-grid" class="grid grid-cols-1 gap-6"></div>
                    
                    <div class="flex justify-between items-center pt-12">
                        <p class="text-4xl font-black">已锁定回答：<span id="locked-count" class="text-blue-600">0</span> / <span id="total-teams">3</span></p>
                        <button id="reveal-btn" onclick="revealAnswers()" class="hidden bg-red-600 text-white px-20 py-8 rounded-full text-5xl font-black shadow-2xl animate-bounce border-8 border-white">揭晓正确答案！</button>
                    </div>
                </div>
            </div>

            <div id="note-box" class="hidden mt-16 p-12 bg-blue-900 text-white rounded-[60px] shadow-2xl animate-fade-in">
                <h4 class="text-4xl font-black mb-6 text-yellow-400">💡 知识精华总结：</h4>
                <p id="note-text" class="text-6xl leading-tight font-black text-white drop-shadow-lg"></p>
                <div class="flex justify-center mt-12">
                    <button onclick="nextRound()" class="bg-yellow-500 text-black px-24 py-8 rounded-full text-4xl font-black hover:scale-110 transition-transform shadow-xl">下一关 →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Result View -->
    <div id="result-view" class="hidden p-12 text-center container mx-auto">
        <h1 class="text-giant mb-16 text-white drop-shadow-2xl">🏆 竞技英雄榜</h1>
        <div class="bg-white rounded-[60px] shadow-2xl overflow-hidden border-8 border-yellow-500 mb-16">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-white text-4xl">
                    <tr><th class="p-12">排名</th><th class="p-12">战队</th><th class="p-12">最终积分</th><th class="p-12">传奇称号</th></tr>
                </thead>
                <tbody id="ranking-body" class="text-5xl font-black"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn-primary text-5xl px-24 py-10">重赛一轮</button>
    </div>

    <!-- Bottom Bar Control -->
    <div id="control-bar" class="bottom-bar hidden">
        <div class="flex gap-6">
            <button onclick="randomPickTeam()" class="bg-blue-600 px-8 py-4 rounded-2xl font-black text-2xl hover:bg-blue-400 shadow-lg border-2 border-white">🎲 随机抽组</button>
            <button id="rand-stu-btn" onclick="randomPickStudent()" class="bg-green-600 px-8 py-4 rounded-2xl font-black text-2xl hover:bg-green-400 shadow-lg border-2 border-white disabled:opacity-30" disabled>👤 随机选人</button>
        </div>
        <div id="manual-teams-row" class="flex gap-4 overflow-x-auto max-w-[50%] p-2"></div>
        <div class="text-right">
            <p id="cur-op-info" class="text-yellow-400 font-black text-2xl">请点选或抽签战队</p>
        </div>
    </div>

    <script>
        let config = { ptsCorrect: 1, ptsWrong: 0, ptsFirstCorrect: 2, ptsFirstWrong: 1, bonusEnabled: true, qCount: 10 };
        let teams = [], scenes = [], curIdx = 0, activeTeamIdx = -1, firstResponderIdx = -1, lockedCount = 0;
        let bgmOn = false;

        const sounds = {
            start: new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'),
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            correct: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/256/256-preview.mp3'),
            bgm: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3')
        };
        sounds.bgm.loop = true;

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
            renderTeamSetupInputs(3);
        };

        function renderTeamSetupInputs(count) {
            const grid = document.getElementById('team-names-grid');
            grid.innerHTML = '';
            for(let i=1; i<=count; i++) {
                grid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border-4 border-gray-100 shadow-sm">
                        <div class="flex justify-between mb-4">
                            <span class="font-black text-xl text-blue-900">战队 ${i}</span>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-gray-500">人数:</span>
                                <input type="number" id="team-size-${i}" value="4" min="1" class="w-16 text-center border-2 border-blue-100 rounded-xl font-bold">
                            </div>
                        </div>
                        <input type="text" id="team-name-${i}" placeholder="输入战队名" class="w-full p-3 border-2 border-gray-100 rounded-xl outline-none focus:border-blue-500 font-bold text-lg">
                    </div>
                `;
            }
        }

        async function fetchModels() {
            const key = document.getElementById('api-key').value.trim();
            if(!key) return alert("请输入 API Key");
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${key}`);
                const data = await res.json();
                if(!res.ok) throw new Error(data.error.message);
                const select = document.getElementById('model-select');
                select.innerHTML = '';
                data.models.filter(m => m.supportedGenerationMethods.includes('generateContent') && m.name.includes('gemini')).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name; opt.innerText = m.displayName || m.name;
                    if(m.name.includes('1.5-flash')) opt.selected = true;
                    select.appendChild(opt);
                });
                localStorage.setItem('gemini_api_key', key);
            } catch(e) { alert(e.message); }
        }

        async function launchAI() {
            const apiKey = document.getElementById('api-key').value.trim(), text = document.getElementById('source-text').value.trim(), model = document.getElementById('model-select').value, qCount = document.getElementById('q-count-input').value;
            if(!apiKey || !text || !model) return alert("请补全所有必填项！");
            
            config = { 
                ptsCorrect: parseInt(document.getElementById('pts-correct').value), 
                ptsWrong: parseInt(document.getElementById('pts-wrong').value),
                ptsFirstCorrect: parseInt(document.getElementById('pts-first-correct').value), 
                ptsFirstWrong: parseInt(document.getElementById('pts-first-wrong').value),
                bonusEnabled: document.getElementById('bonus-enabled').checked, 
                qCount: parseInt(qCount) 
            };
            
            const tCount = document.getElementById('team-count-input').value;
            teams = [];
            for(let i=1; i<=tCount; i++) teams.push({ name: document.getElementById(`team-name-${i}`).value || `战队 ${i}`, size: parseInt(document.getElementById(`team-size-${i}`).value), score: 0, selection: null, isFirst: false, isRandom: false });

            document.getElementById('loading').classList.remove('hidden');
            const prompt = `Task: Create EXACTLY ${config.qCount} quiz questions from this text: "${text}". 
            Format: JSON array of objects.
            Keys: q, options (3 strings), ans (0-2 index), note, title, emoji, diff (⭐ to ⭐⭐⭐⭐⭐). 
            ${config.bonusEnabled ? "IMPORTANT: The last 3 questions must be significantly HARDER and CHALLENGING. Mark diff as ⭐⭐⭐⭐⭐." : ""} 
            Include 'themeColor' (Hex code) based on content. Output ONLY JSON.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/${model}:generateContent?key=${apiKey}`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) 
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "API 失败");
                const aiTxt = data.candidates[0].content.parts[0].text;
                const match = aiTxt.match(/\[[\s\S]*\]/);
                if (!match) throw new Error("AI 格式错误，请尝试减少字数或重试。");
                
                scenes = JSON.parse(match[0]);
                const themeCol = scenes[0].themeColor || '#3b82f6';
                document.documentElement.style.setProperty('--theme-color', themeCol);

                // Start Music
                sounds.start.play(); sounds.bgm.play(); bgmOn = true;
                document.getElementById('bgm-widget').classList.remove('hidden');

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('game-view').classList.remove('hidden');
                document.getElementById('control-bar').classList.remove('hidden');
                loadRound();
            } catch(e) { alert("生成失败: " + e.message); document.getElementById('loading').classList.add('hidden'); }
        }

        function loadRound() {
            const s = scenes[curIdx];
            document.getElementById('round-title').innerText = `第 ${curIdx+1}/${scenes.length} 关：${s.title}`;
            document.getElementById('round-diff').innerText = s.diff;
            document.getElementById('q-emoji').innerText = s.emoji;
            document.getElementById('q-text').innerText = s.q;
            document.getElementById('note-box').classList.add('hidden');
            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('active-team-info').innerText = "等待点选...";
            
            const isBonus = config.bonusEnabled && (curIdx >= scenes.length - 3);
            document.getElementById('bonus-tag').classList.toggle('hidden', !isBonus);

            activeTeamIdx = -1; firstResponderIdx = -1; lockedCount = 0;
            teams.forEach(t => { t.selection = null; t.isFirst = false; t.isRandom = false; });
            
            document.getElementById('locked-count').innerText = "0";
            document.getElementById('total-teams').innerText = teams.length;
            
            renderOptions(); renderControlTeams(); renderLiveScores();
            speak(s.q);
        }

        function renderOptions() {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            scenes[curIdx].options.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = "option-card shadow-lg";
                card.innerHTML = `<span class="bg-gray-800 text-white w-20 h-20 rounded-2xl flex items-center justify-center mr-8 text-5xl">${String.fromCharCode(65+i)}</span> <span class="flex-grow">${opt}</span>`;
                card.onclick = () => selectChoice(i);
                grid.appendChild(card);
            });
        }

        function renderControlTeams() {
            const row = document.getElementById('manual-teams-row');
            row.innerHTML = teams.map((t, i) => `
                <button onclick="pickTeam(${i}, false)" class="px-8 py-3 rounded-2xl border-4 font-black whitespace-nowrap text-xl transition-all ${t.selection !== null ? 'opacity-20 grayscale' : (i === activeTeamIdx ? 'bg-yellow-400 border-black text-black scale-110 shadow-xl' : 'bg-white border-blue-500 text-blue-500 hover:scale-105')}">
                    ${t.name}
                </button>
            `).join('');
        }

        function pickTeam(idx, isRand) {
            if(teams[idx].selection !== null) return;
            sounds.click.play();
            activeTeamIdx = idx;
            teams[idx].isRandom = isRand;
            document.getElementById('active-team-info').innerText = teams[idx].name + (isRand ? " (抽中)" : " (抢答组)");
            document.getElementById('rand-stu-btn').disabled = false;
            renderControlTeams();
        }

        function randomPickTeam() {
            const av = teams.map((t,i)=>i).filter(i=>teams[i].selection === null);
            if(av.length === 0) return;
            const r = av[Math.floor(Math.random()*av.length)];
            pickTeam(r, true);
        }

        function randomPickStudent() {
            if(activeTeamIdx === -1) return;
            const sNum = Math.floor(Math.random() * teams[activeTeamIdx].size) + 1;
            document.getElementById('active-team-info').innerText = `${teams[activeTeamIdx].name} - ${sNum}号学生`;
            speak(`请 ${teams[activeTeamIdx].name} 的 ${sNum} 号学生回答`);
        }

        function selectChoice(idx) {
            if(activeTeamIdx === -1) return alert("请先在底部选择正在作答的战队！");
            const t = teams[activeTeamIdx];
            t.selection = idx;
            if(firstResponderIdx === -1) { firstResponderIdx = activeTeamIdx; t.isFirst = true; }
            
            lockedCount++; activeTeamIdx = -1;
            document.getElementById('locked-count').innerText = lockedCount;
            document.getElementById('rand-stu-btn').disabled = true;
            document.getElementById('active-team-info').innerText = "已提交锁定";
            
            sounds.click.play(); renderControlTeams();
            if(lockedCount === teams.length) document.getElementById('reveal-btn').classList.remove('hidden');
        }

        function revealAnswers() {
            const ans = scenes[curIdx].ans, cards = document.getElementById('options-grid').children;
            for(let i=0; i<cards.length; i++) cards[i].classList.add(i === ans ? 'correct' : 'wrong');
            
            const isBonus = config.bonusEnabled && (curIdx >= scenes.length - 3);
            const mult = isBonus ? 2 : 1;

            teams.forEach(t => {
                if(t.selection === ans) {
                    // 如果是 Bonus 关卡，去掉抢答加成功能，统一用普通加分
                    let p = (t.isFirst && !t.isRandom && !isBonus) ? config.ptsFirstCorrect : config.ptsCorrect;
                    t.score += p * mult;
                    sounds.correct.play();
                } else {
                    // 如果是 Bonus 关卡，去掉抢答加成功能，统一用普通扣分
                    let p = (t.isFirst && !t.isRandom && !isBonus) ? config.ptsFirstWrong : config.ptsWrong;
                    t.score -= p * mult;
                    if(p > 0) sounds.wrong.play();
                }
            });

            renderLiveScores();
            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('note-box').classList.remove('hidden');
            document.getElementById('note-text').innerText = scenes[curIdx].note;
            document.getElementById('note-box').scrollIntoView({ behavior: 'smooth' });
            
            speak(`知识要点总结：${scenes[curIdx].note}`);
        }

        function nextRound() {
            curIdx++;
            if(curIdx < scenes.length) loadRound();
            else showResults();
        }

        function renderLiveScores() {
            document.getElementById('live-scores').innerHTML = teams.map(t => `<div class="bg-gray-800 text-white px-8 py-3 rounded-2xl font-black text-2xl border-b-8 border-yellow-500 shadow-xl">${t.name}: ${t.score}</div>`).join('');
        }

        function showResults() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('control-bar').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const sorted = [...teams].sort((a,b) => b.score - a.score);
            document.getElementById('ranking-body').innerHTML = sorted.map((t, i) => {
                let r = i === 0 ? (t.score > 20 ? "👑 全知全能神" : "🥇 智慧大师") : (i === 1 ? "🥈 知识守护者" : (i === 2 ? "🥉 潜力新星" : "📜 历史见证者"));
                return `<tr class="${i === 0 ? 'bg-yellow-50' : 'border-b'}"><td class="p-12 text-7xl text-gray-400">#${i+1}</td><td class="p-12">${t.name}</td><td class="p-12"><span class="bg-blue-600 text-white px-10 py-4 rounded-3xl shadow-2xl">${t.score}</span></td><td class="p-12 text-blue-800 font-black">${r}</td></tr>`;
            }).join('');
            speak("竞技结束，恭喜获胜者！");
        }

        function toggleBGM() {
            if(bgmOn) sounds.bgm.pause(); else sounds.bgm.play();
            bgmOn = !bgmOn;
        }

        function updateVolume(v) { sounds.bgm.volume = v; }

        function speak(t) {
            if(!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'zh-CN'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
