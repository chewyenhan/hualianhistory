let wheelState = { startAngle: 0, spinCount: 0, firstStudent: null, secondStudent: null, isSpinning: false, excludeStudent: null, lastSpunName: null };
let wheelTimeout = null;
let charSelectState = { pickingFor: 'left', leftPick: null, rightPick: null, singlePick: false };

function getWheelCandidateNames() {
    var names = config.allowRepeat ? Object.keys(students) : Object.keys(students).filter(function(n) { return !students[n].eliminated; });
    if (wheelState.excludeStudent) {
        var filtered = names.filter(function(n) { return n !== wheelState.excludeStudent; });
        if (filtered.length >= 1) names = filtered;
    }
    return names;
}

function initWheel(availableNames) {
    const canvas = document.getElementById('wheelCanvas'), ctx = canvas.getContext('2d');
    if (!canvas || !ctx) return;
    const num = availableNames.length;
    if (num === 0) return;
    const arc = (2 * Math.PI) / num;
    const colors = ['#ff9ebb','#a0d8ef','#fbbf24','#3b82f6','#8b5cf6','#f472b6','#fb923c','#34d399','#f87171','#60a5fa'];
    ctx.clearRect(0, 0, 600, 600);
    for (let i = 0; i < num; i++) {
        const angle = wheelState.startAngle + i * arc;
        ctx.beginPath(); ctx.moveTo(300, 300); ctx.arc(300, 300, 280, angle, angle + arc);
        ctx.fillStyle = colors[i % colors.length]; ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
        ctx.save(); ctx.translate(300, 300); ctx.rotate(angle + arc / 2);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 28px "Noto Sans SC"'; ctx.textAlign = 'right';
        ctx.fillText(availableNames[i], 270, 10); ctx.restore();
    }
}

function spinWheel() {
    if (wheelState.isSpinning) return;
    wheelState.isSpinning = true;
    document.getElementById('spin-btn').disabled = true;
    document.getElementById('wheel-result').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    clearTimeout(wheelTimeout);

    const speed = 0.4 + Math.random() * 0.5, duration = 3500;
    let start = null, lastTick = 0;
    function animate(time) {
        if (!start) start = time;
        const progress = (time - start) / duration;
        if (progress < 1) {
            wheelState.startAngle += speed * (1 - progress);
            if (wheelState.startAngle - lastTick > 0.08) { playWheelTick(); lastTick = wheelState.startAngle; }
            const avail = getWheelCandidateNames();
            initWheel(avail);
            requestAnimationFrame(animate);
        } else {
            const avail = getWheelCandidateNames();
            const arc = (2 * Math.PI) / avail.length;
            const idx = Math.floor((1.5 * Math.PI - (wheelState.startAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI) / arc) % avail.length;
            const chosen = avail[idx];
            wheelState.isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('wheel-result-actions').classList.remove('hidden');
            document.getElementById('wheel-result').classList.remove('hidden');
            document.getElementById('wheel-result-name').innerText = chosen;
            wheelState.lastSpunName = chosen;
            onWheelComplete(chosen);
        }
    }
    requestAnimationFrame(animate);
}

function getAvailableStudents() {
    const names = Object.keys(students);
    if (config.allowRepeat) return names;
    return names.filter(n => !students[n].eliminated);
}

function getUneliminatedStudents() {
    if (config.allowRepeat) return Object.keys(students);
    return Object.keys(students).filter(n => !students[n].eliminated);
}

function onWheelComplete(name) {
    playCorrectSound();
    // Track participation
    if (students[name]) students[name].usedCount = (students[name].usedCount || 0) + 1;

    if (wheelState.spinCount === 0) {
        wheelState.firstStudent = name;
        battleState.leftStudent = name;
        wheelState.spinCount = 1;
        document.getElementById('wheel-label').innerText = '左方战士：' + name + ' ✅';
        speak(name + '，准备出战！');
    } else {
        wheelState.secondStudent = name;
        battleState.rightStudent = name;
        wheelState.excludeStudent = null;
        document.getElementById('wheel-label').innerText = '右方战士：' + name + ' ✅  双方已就位！';
        speak(name + '，准备出战！');
    }

    // Show confirm + skip buttons, wait for teacher action
    document.getElementById('wheel-result-actions').classList.remove('hidden');
    document.getElementById('confirm-student-btn').classList.remove('hidden');
    document.getElementById('skip-student-btn').classList.remove('hidden');
}

function skipCurrentStudent() {
    clearTimeout(wheelTimeout);
    var nameToSkip = wheelState.lastSpunName;
    if (!nameToSkip) return;

    // Remove student from the students object
    delete students[nameToSkip];

    // Also update the textarea
    var textarea = document.getElementById('student-list');
    if (textarea) {
        var lines = textarea.value.split(/[,，\s\n]+/).filter(Boolean);
        textarea.value = lines.filter(function(l) { return l !== nameToSkip; }).join(', ');
    }

    // Hide result and buttons
    document.getElementById('wheel-result').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    wheelState.lastSpunName = null;

    if (wheelState._spinForSlot) {
        // Replacement spin: re-spin for same slot
        spinForSlot(wheelState._spinForSlot);
    } else if (wheelState.secondStudent) {
        // Second spin just completed: re-do second pick
        wheelState.secondStudent = null;
        battleState.rightStudent = null;
        wheelState.excludeStudent = wheelState.firstStudent;
        document.getElementById('wheel-label').innerText = '🔵 右方战士抽选中...';
        var avail = getWheelCandidateNames();
        initWheel(avail);
    } else {
        // First spin just completed: re-do first pick
        wheelState.firstStudent = null;
        battleState.leftStudent = null;
        wheelState.spinCount = 0;
        wheelState.excludeStudent = null;
        document.getElementById('wheel-label').innerText = '🔴 左方战士抽选中...';
        var avail2 = getWheelCandidateNames();
        initWheel(avail2);
    }
}

function confirmStudent() {
    clearTimeout(wheelTimeout);
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    document.getElementById('wheel-result').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');

    if (wheelState._spinForSlot) {
        // Replacement spin: proceed to single character select
        var pickSlot = wheelState._spinForSlot;
        delete wheelState._spinForSlot;
        wheelState.lastSpunName = null;
        document.getElementById('wheel-view').classList.add('hidden');
        startSingleCharSelect(pickSlot);
    } else if (wheelState.firstStudent && !wheelState.secondStudent) {
        // First spin confirmed, prepare for second spin
        wheelState.excludeStudent = wheelState.firstStudent;
        document.getElementById('wheel-label').innerText = '🔵 右方战士抽选中...';
        var avail = getWheelCandidateNames();
        initWheel(avail);
    } else if (wheelState.secondStudent) {
        // Second spin confirmed, proceed to character selection
        wheelState.lastSpunName = null;
        document.getElementById('wheel-view').classList.add('hidden');
        startCharacterSelection();
    }
}

function startWheelPhase() {
    document.getElementById('setup-view').classList.add('hidden');
    document.getElementById('wheel-view').classList.remove('hidden');
    document.getElementById('wheel-label').innerText = '🔴 左方战士抽选中...';
    document.getElementById('wheel-result').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    clearTimeout(wheelTimeout);
    wheelState.spinCount = 0; wheelState.firstStudent = null; wheelState.secondStudent = null;
    wheelState.excludeStudent = null; wheelState.lastSpunName = null;
    const avail = getWheelCandidateNames();
    initWheel(avail);
}

function startSingleCharSelect(slot) {
    // Only the new challenger picks; the staying winner keeps their character
    document.getElementById('char-select-view').classList.remove('hidden');
    var otherChar = slot === 'left' ? battleState.rightCharacter : battleState.leftCharacter;
    charSelectState = {
        pickingFor: slot,
        leftPick: slot === 'left' ? null : otherChar,
        rightPick: slot === 'right' ? null : otherChar,
        singlePick: true
    };
    renderCharacterGrid();
}

function startCharacterSelection() {
    document.getElementById('wheel-view').classList.add('hidden');
    document.getElementById('char-select-view').classList.remove('hidden');
    charSelectState = { pickingFor: 'left', leftPick: null, rightPick: null, singlePick: false };
    renderCharacterGrid();
}

function renderCharacterGrid() {
    const grid = document.getElementById('char-card-grid');
    grid.innerHTML = '';
    const prompt = document.getElementById('char-select-prompt');
    const whoPicking = charSelectState.pickingFor === 'left' ? battleState.leftStudent : battleState.rightStudent;
    prompt.innerText = `${whoPicking} — 选择你的战士！`;

    Object.entries(CHARACTERS).forEach(([key, data]) => {
        const taken = (charSelectState.pickingFor === 'right' && key === charSelectState.leftPick) ||
                      (charSelectState.pickingFor === 'left' && charSelectState.singlePick && key === charSelectState.rightPick);
        const card = document.createElement('div');
        card.className = 'char-card ' + (taken ? 'taken' : '');
        const preview = document.createElement('canvas');
        preview.width = 96; preview.height = 96;
        const pctx = preview.getContext('2d');
        const sprite = getCharacterCanvas(key, 1);
        pctx.imageSmoothingEnabled = false;
        pctx.drawImage(sprite.canvas, 0, 0, 96, 96);
        card.appendChild(preview);
        const nameEl = document.createElement('p');
        nameEl.className = 'font-black text-xl mt-2';
        nameEl.innerText = data.emoji + ' ' + data.name;
        card.appendChild(nameEl);
        if (!taken) card.onclick = () => selectCharacter(key);
        grid.appendChild(card);
    });
}

function selectCharacter(charKey) {
    playSynth(800, 'square', 0.1, 0.2);
    if (charSelectState.pickingFor === 'left') {
        charSelectState.leftPick = charKey;
        battleState.leftCharacter = charKey;
        battleState.leftLevel = 1;
        if (charSelectState.singlePick) {
            charSelectState.pickingFor = 'done';
            document.getElementById('char-select-view').classList.add('hidden');
            showVSCountdown();
            return;
        }
        charSelectState.pickingFor = 'right';
        renderCharacterGrid();
    } else if (charSelectState.pickingFor === 'right') {
        charSelectState.rightPick = charKey;
        battleState.rightCharacter = charKey;
        battleState.rightLevel = 1;
        if (charSelectState.singlePick) {
            charSelectState.pickingFor = 'done';
            document.getElementById('char-select-view').classList.add('hidden');
            showVSCountdown();
            return;
        }
        charSelectState.pickingFor = 'done';
        document.getElementById('char-select-view').classList.add('hidden');
        showVSCountdown();
    }
}

function showVSCountdown() {
    const overlay = document.getElementById('vs-overlay');
    const text = document.getElementById('vs-text');
    overlay.classList.remove('hidden');
    const leftName = battleState.leftStudent, rightName = battleState.rightStudent;
    const leftChar = CHARACTERS[battleState.leftCharacter].emoji;
    const rightChar = CHARACTERS[battleState.rightCharacter].emoji;

    [3, 2, 1].forEach((n, i) => {
        setTimeout(() => {
            text.innerText = n; text.style.color = n === 1 ? '#ef4444' : '#fbbf24';
            playCountTick();
        }, i * 800);
    });
    setTimeout(() => {
        text.innerText = 'FIGHT!';
        text.style.color = '#ef4444';
        text.style.fontSize = '6rem';
        playSynth(1000, 'square', 0.1, 0.3);
    }, 2400);
    setTimeout(() => {
        overlay.classList.add('hidden');
        text.style.fontSize = '8rem';
        startBattleRound();
    }, 3200);
}

// ============ SECTION 7: BATTLE LOGIC ============
function startBattleRound() {
    battleState.buzzerWinner = null;
    battleState.secondChance = false;
    battleState.roundResolved = false;
    battleState.timerPhase = 'waiting';
    battleState.timerActiveSide = null;

    // Reset per-round lock state
    buzzerFailedLeft = false;
    buzzerFailedRight = false;
    pausedTimerRemaining = 0;
    turnOverlayActive = false;
    leftFallen = false;
    rightFallen = false;
    setSingleBuzzerEnabled('left', true);
    setSingleBuzzerEnabled('right', true);

    document.getElementById('battle-view').classList.remove('hidden');
    document.getElementById('battle-note').classList.add('hidden');

    const leftName = battleState.leftStudent || '左战士';
    const rightName = battleState.rightStudent || '右战士';
    document.getElementById('buzzer-left-name').innerText = leftName;
    document.getElementById('buzzer-right-name').innerText = rightName;
    document.getElementById('timer-label').innerText = '⏱️ 抢答倒计时';

    if (students[leftName]) battleState.leftLevel = students[leftName].level || 1;
    if (students[rightName]) battleState.rightLevel = students[rightName].level || 1;

    resizeCanvas();
    startRenderLoop();

    if (battleState.questionIndex >= scenes.length) {
        stopRenderLoop();
        document.getElementById('battle-view').classList.add('hidden');
        showLeaderboard();
        return;
    }
    const q = scenes[battleState.questionIndex];
    document.getElementById('battle-question').innerHTML = '<span style="font-size:1rem;opacity:0.5">' + (q.diff||'') + ' ' + (q.emoji||'') + '</span><br>' + q.q;
    renderBattleOptions(q.options);

    setOptionsEnabled(false);
    setBuzzersEnabled(true);
    document.getElementById('buzzer-left-btn').classList.remove('active-buzz');
    document.getElementById('buzzer-right-btn').classList.remove('active-buzz');
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('correct-answer','wrong-choice'));

    if (config.timerEnabled) startBattleTimer(config.timerSeconds, 'waiting');
    if (battleState.questionIndex === 0) speak('第一题！' + q.q);
    else speak(q.q);
}

function renderBattleOptions(options) {
    const container = document.getElementById('battle-options');
    container.innerHTML = '';
    options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = '<span style="font-weight:900;margin-right:10px">' + (i+1) + '.</span> ' + opt;
        btn.id = 'battle-opt-' + i;
        btn.disabled = true;
        btn.onclick = function() { handleAnswerChoice(i); };
        container.appendChild(btn);
    });
}

function setOptionsEnabled(en) {
    document.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = !en; });
}

function setBuzzersEnabled(en) {
    document.getElementById('buzzer-left-btn').disabled = !en;
    document.getElementById('buzzer-right-btn').disabled = !en;
}

function setSingleBuzzerEnabled(side, enabled) {
    var btn = document.getElementById(side === 'left' ? 'buzzer-left-btn' : 'buzzer-right-btn');
    btn.disabled = !enabled;
    if (!enabled) { btn.style.opacity = '0.3'; btn.style.cursor = 'not-allowed'; }
    else { btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
}

function showTurnOverlay(name) {
    turnOverlayActive = true;
    document.getElementById('turn-overlay-name').textContent = '轮到 ' + name + ' 作答！';
    document.getElementById('turn-overlay').style.display = 'flex';
    speak(name + '，轮到你作答！');
}

function dismissTurnOverlay() {
    if (!turnOverlayActive) return;
    turnOverlayActive = false;
    document.getElementById('turn-overlay').style.display = 'none';
    setOptionsEnabled(true);
    startBattleTimer(config.answerSeconds, 'answering', battleState.buzzerWinner);
    var buzzerName = battleState.buzzerWinner === 'left' ? battleState.leftStudent : battleState.rightStudent;
    document.getElementById('timer-label').innerText = '⚡ ' + buzzerName + ' 作答中...';
    speak(buzzerName + '，请作答！');
}

function handleBuzzer(side) {
    if (battleState.buzzerWinner !== null) return;
    if (battleState.roundResolved) return;
    if (battleState.timerPhase !== 'waiting') return;
    if (side === 'left' && buzzerFailedLeft) return;
    if (side === 'right' && buzzerFailedRight) return;

    battleState.buzzerWinner = side;
    playBuzzerSound();
    pausedTimerRemaining = battleState.timerRemaining;
    stopBattleTimer();
    setBuzzersEnabled(false);

    var btnId = side === 'left' ? 'buzzer-left-btn' : 'buzzer-right-btn';
    document.getElementById(btnId).classList.add('active-buzz');

    battleState.timerPhase = 'answering';
    battleState.timerActiveSide = side;

    var name = side === 'left' ? battleState.leftStudent : battleState.rightStudent;
    showTurnOverlay(name);
}

function handleAnswerChoice(optIdx) {
    if (battleState.buzzerWinner === null) return;
    if (battleState.roundResolved) return;
    if (battleState.timerPhase !== 'answering') return;

    stopBattleTimer();
    var q = scenes[battleState.questionIndex];
    var isCorrect = (optIdx === q.ans);
    var answeringSide = battleState.buzzerWinner;
    var opponentSide = answeringSide === 'left' ? 'right' : 'left';

    if (isCorrect) {
        // First student correct → reveal answer + resolve
        document.querySelectorAll('.option-btn').forEach(function(b, i) {
            if (i === q.ans) b.classList.add('correct-answer');
        });
        resolveRound('correct', answeringSide);
    } else if (battleState.secondChance) {
        // Both tried → reveal correct answer + both lose
        document.querySelectorAll('.option-btn').forEach(function(b, i) {
            if (i === q.ans) b.classList.add('correct-answer');
            if (i === optIdx) b.classList.add('wrong-choice');
        });
        resolveRound('both_lose');
    } else {
        // First student wrong → mark wrong, lock their buzzer, resume main timer for opponent
        document.querySelectorAll('.option-btn').forEach(function(b, i) {
            if (i === optIdx) b.classList.add('wrong-choice');
        });
        battleState.secondChance = true;
        playWrongSound();

        // Lock the failed student's buzzer
        if (answeringSide === 'left') buzzerFailedLeft = true;
        else buzzerFailedRight = true;
        setSingleBuzzerEnabled(answeringSide, false);
        var failedNameEl = document.getElementById(answeringSide === 'left' ? 'buzzer-left-name' : 'buzzer-right-name');
        failedNameEl.textContent = '❌ ' + (answeringSide === 'left' ? battleState.leftStudent : battleState.rightStudent) + '（已答错）';
        document.getElementById(answeringSide === 'left' ? 'buzzer-left-btn' : 'buzzer-right-btn').classList.remove('active-buzz');

        battleState.buzzerWinner = null;
        battleState.timerPhase = 'waiting';
        battleState.timerActiveSide = null;
        setOptionsEnabled(false);

        var oppName = opponentSide === 'left' ? battleState.leftStudent : battleState.rightStudent;
        setTimeout(function() {
            // Clear the wrong-choice highlight so second student sees clean options
            document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('wrong-choice'); });
            // Re-enable opponent's buzzer and resume main countdown
            setSingleBuzzerEnabled(opponentSide, true);
            document.getElementById('timer-label').innerText = '⏱️ 抢答倒计时';
            startBattleTimer(pausedTimerRemaining, 'waiting');
            speak(oppName + '，轮到你了！');
        }, 800);
    }
}

function resolveRound(result, winningSide) {
    battleState.roundResolved = true;
    battleState.timerPhase = 'done';
    stopBattleTimer();
    setBuzzersEnabled(false);
    setOptionsEnabled(false);

    var q = scenes[battleState.questionIndex];
    document.querySelectorAll('.option-btn').forEach(function(b, i) {
        b.disabled = true;
        if (i === q.ans) b.classList.add('correct-answer');
    });

    var leftName = battleState.leftStudent, rightName = battleState.rightStudent;
    var leftChar = battleState.leftCharacter, rightChar = battleState.rightCharacter;

    if (result === 'correct' && winningSide) {
        var winnerName = winningSide === 'left' ? leftName : rightName;
        var loserName = winningSide === 'left' ? rightName : leftName;
        var winnerChar = winningSide === 'left' ? leftChar : rightChar;
        var loserChar = winningSide === 'left' ? rightChar : leftChar;

        if (students[winnerName]) {
            students[winnerName].wins++;
            students[winnerName].streak++;
            students[winnerName].correctAnswers++;
            students[winnerName].totalQuestions++;
            students[winnerName].character = winnerChar;
            students[winnerName].eliminated = false; // Winner stays alive
            if (students[winnerName].streak > students[winnerName].bestStreak) students[winnerName].bestStreak = students[winnerName].streak;
            checkLevelUp(winnerName);
        }
        if (students[loserName]) {
            students[loserName].losses++;
            students[loserName].streak = 0;
            students[loserName].level = 1;
            students[loserName].totalQuestions++;
            students[loserName].eliminated = true;
            students[loserName].character = loserChar;
        }

        playCorrectSound();
        addAttackAnimation(winningSide, winnerChar);
        setTimeout(function() {
            addFallAnimation(winningSide === 'left' ? 'right' : 'left', loserChar, winningSide === 'left' ? battleState.rightLevel : battleState.leftLevel);
        }, 700);

    } else if (result === 'both_lose') {
        if (students[leftName]) {
            students[leftName].losses++; students[leftName].streak = 0; students[leftName].level = 1; students[leftName].totalQuestions++;
            students[leftName].eliminated = true; students[leftName].character = leftChar;
        }
        if (students[rightName]) {
            students[rightName].losses++; students[rightName].streak = 0; students[rightName].level = 1; students[rightName].totalQuestions++;
            students[rightName].eliminated = true; students[rightName].character = rightChar;
        }
        playWrongSound();
        addFallAnimation('left', leftChar, battleState.leftLevel);
        setTimeout(function() { addFallAnimation('right', rightChar, battleState.rightLevel); }, 300);
    }

    setTimeout(function() {
        document.getElementById('battle-note').classList.remove('hidden');
        document.getElementById('battle-note-text').innerText = q.note || '';
        document.getElementById('timer-label').innerText = '✅ 回合结束';
        var nextBtn = document.getElementById('next-round-btn-text');
        if (battleState.questionIndex + 1 >= scenes.length) {
            nextBtn.innerText = '🏆 查看最终英雄榜 →';
        } else {
            nextBtn.innerText = '下一场对决 →';
        }
    }, 1500);
}

function proceedAfterRound() {
    document.getElementById('battle-note').classList.add('hidden');
    battleState.questionIndex++;

    if (battleState.questionIndex >= scenes.length) {
        stopRenderLoop();
        document.getElementById('battle-view').classList.add('hidden');
        showLeaderboard();
        return;
    }

    var leftName = battleState.leftStudent, rightName = battleState.rightStudent;
    var leftAlive = students[leftName] && !students[leftName].eliminated;
    var rightAlive = students[rightName] && !students[rightName].eliminated;

    stopRenderLoop();

    if (leftAlive && !rightAlive) {
        battleState.leftStudent = leftName;
        battleState.leftCharacter = (students[leftName] && students[leftName].character) || battleState.leftCharacter;
        battleState.leftLevel = (students[leftName] && students[leftName].level) || 1;
        spinForSlot('right');
    } else if (!leftAlive && rightAlive) {
        battleState.rightStudent = rightName;
        battleState.rightCharacter = (students[rightName] && students[rightName].character) || battleState.rightCharacter;
        battleState.rightLevel = (students[rightName] && students[rightName].level) || 1;
        spinForSlot('left');
    } else {
        spinForBoth();
    }
}

function spinForSlot(slot) {
    // Reset eliminated flags if no challengers available
    var uneliminated = Object.keys(students).filter(function(n) { return !students[n].eliminated; });
    if (uneliminated.length < 2) {
        Object.keys(students).forEach(function(n) { students[n].eliminated = false; });
    }
    document.getElementById('battle-view').classList.add('hidden');
    document.getElementById('wheel-view').classList.remove('hidden');
    document.getElementById('wheel-label').innerText = slot === 'left' ? '🔴 左方新战士抽选中...' : '🔵 右方新战士抽选中...';
    document.getElementById('wheel-result').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    clearTimeout(wheelTimeout);
    wheelState.spinCount = 1; // Single spin
    wheelState._spinForSlot = slot;
    var winnerName = slot === 'left' ? battleState.rightStudent : battleState.leftStudent;
    wheelState.excludeStudent = winnerName; // Exclude winner from wheel

    var avail = getWheelCandidateNames();
    initWheel(avail);

    var origComplete = onWheelComplete;
    onWheelComplete = function(name) {
        playCorrectSound();
        if (students[name]) students[name].usedCount = (students[name].usedCount || 0) + 1;
        if (wheelState._spinForSlot === 'left') {
            battleState.leftStudent = name;
            document.getElementById('wheel-label').innerText = '左方新战士：' + name + ' ✅';
        } else {
            battleState.rightStudent = name;
            document.getElementById('wheel-label').innerText = '右方新战士：' + name + ' ✅';
        }
        wheelState.excludeStudent = null;
        wheelState.lastSpunName = name;
        wheelState._spinForSlot = wheelState._spinForSlot; // keep for confirmStudent
        onWheelComplete = origComplete;
        // Show confirm + skip buttons, wait for teacher action
        document.getElementById('wheel-result-actions').classList.remove('hidden');
        document.getElementById('confirm-student-btn').classList.remove('hidden');
        document.getElementById('skip-student-btn').classList.remove('hidden');
    };
}

function spinForBoth() {
    document.getElementById('battle-view').classList.add('hidden');
    document.getElementById('wheel-result-actions').classList.add('hidden');
    document.getElementById('confirm-student-btn').classList.add('hidden');
    document.getElementById('skip-student-btn').classList.add('hidden');
    clearTimeout(wheelTimeout);
    wheelState.spinCount = 0;
    wheelState.firstStudent = null;
    wheelState.secondStudent = null;
    // Reset eliminated for all students if none available
    var uneliminated = Object.keys(students).filter(function(n) { return !students[n].eliminated; });
    if (uneliminated.length < 2) {
        Object.keys(students).forEach(function(n) { students[n].eliminated = false; });
    }
    startWheelPhase();
}

// ============ SECTION 8: TIMER ============
function startBattleTimer(seconds, phase, side) {
    stopBattleTimer();
    battleState.timerRemaining = seconds;
    battleState.timerPhase = phase;
    battleState.timerActiveSide = side || null;
    updateTimerDisplay(seconds, seconds);
    battleState.timerInterval = setInterval(function() {
        battleState.timerRemaining--;
        updateTimerDisplay(battleState.timerRemaining, seconds);
        if (battleState.timerRemaining <= 5 && battleState.timerRemaining > 0) playCountTick();
        if (battleState.timerRemaining <= 0) {
            stopBattleTimer();
            handleTimerExpired(phase, side);
        }
    }, 1000);
}

function stopBattleTimer() {
    if (battleState.timerInterval) { clearInterval(battleState.timerInterval); battleState.timerInterval = null; }
}

function updateTimerDisplay(remaining, total) {
    var pct = (remaining / total) * 100;
    var fill = document.getElementById('timer-bar-fill');
    var text = document.getElementById('timer-text');
    fill.style.width = pct + '%';
    text.innerText = remaining;
    if (remaining <= 3) fill.style.background = '#ef4444';
    else if (remaining <= 5) fill.style.background = '#eab308';
    else fill.style.background = '#22c55e';
}

function handleTimerExpired(phase, side) {
    if (phase === 'waiting') {
        // Both failed to buzz
        resolveRound('both_lose');
        speak('时间到！双方都未抢答！');
    } else if (phase === 'answering') {
        if (!battleState.secondChance) {
            battleState.secondChance = true;
            // Lock the timed-out student's buzzer instead of auto-giving to opponent
            var timedOutSide = side;
            if (timedOutSide === 'left') buzzerFailedLeft = true;
            else buzzerFailedRight = true;
            setSingleBuzzerEnabled(timedOutSide, false);
            var failedNameEl = document.getElementById(timedOutSide === 'left' ? 'buzzer-left-name' : 'buzzer-right-name');
            failedNameEl.textContent = '⏰ ' + (timedOutSide === 'left' ? battleState.leftStudent : battleState.rightStudent) + '（超时）';
            document.getElementById(timedOutSide === 'left' ? 'buzzer-left-btn' : 'buzzer-right-btn').classList.remove('active-buzz');

            var oppSide = timedOutSide === 'left' ? 'right' : 'left';
            battleState.buzzerWinner = null;
            battleState.timerPhase = 'waiting';
            battleState.timerActiveSide = null;
            setOptionsEnabled(false);
            // Re-enable opponent's buzzer and resume main countdown
            setSingleBuzzerEnabled(oppSide, true);
            document.getElementById('timer-label').innerText = '⏱️ 抢答倒计时';
            startBattleTimer(pausedTimerRemaining, 'waiting');
            var oppName = oppSide === 'left' ? battleState.leftStudent : battleState.rightStudent;
            speak(oppName + '，轮到你了！');
        } else {
            resolveRound('both_lose');
            speak('时间到！双方都未答对！');
        }
    }
}

// ============ SECTION 9: LEADERBOARD ============
function showLeaderboard() {
    stopRenderLoop();
    playVictorySound();
    document.getElementById('battle-view').classList.add('hidden');

    var sorted = Object.values(students).sort(function(a, b) {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (b.bestStreak !== a.bestStreak) return b.bestStreak - a.bestStreak;
        var rateA = a.totalQuestions > 0 ? a.correctAnswers / a.totalQuestions : 0;
        var rateB = b.totalQuestions > 0 ? b.correctAnswers / b.totalQuestions : 0;
        return rateB - rateA;
    });

    var body = document.getElementById('leaderboard-body');
    body.innerHTML = sorted.map(function(s, i) {
        var badge = i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        var winRate = s.totalQuestions > 0 ? Math.round(s.correctAnswers / s.totalQuestions * 100) : 0;
        var charEmoji = s.character ? CHARACTERS[s.character].emoji : '❓';
        var charName = s.character ? CHARACTERS[s.character].name : '-';
        var levelStars = '⭐'.repeat(s.level || 1);

        return '<tr class="border-b border-white/10 ' + (i < 3 ? 'bg-yellow-50/10' : '') + '">' +
            '<td class="p-6 text-center text-4xl font-black">' + badge + ' #' + (i+1) + '</td>' +
            '<td class="p-6 text-3xl font-black">' + s.name + '</td>' +
            '<td class="p-6 text-center text-2xl">' + charEmoji + ' ' + charName + ' ' + levelStars + '</td>' +
            '<td class="p-6 text-center text-3xl font-black text-yellow-400">' + s.wins + '</td>' +
            '<td class="p-6 text-center text-2xl font-black text-orange-400">🔥 ' + s.bestStreak + '</td>' +
            '<td class="p-6 text-center text-2xl">' + winRate + '%</td></tr>';
    }).join('');

    document.getElementById('leaderboard-view').classList.remove('hidden');
    speak('决战结束！恭喜获胜者！');
}

function downloadStandaloneQuiz() {
    if (!scenes || scenes.length === 0) { alert('没有可下载的题目！'); return; }
    var title = document.querySelector('h1') ? document.querySelector('h1').innerText : '互动 Quiz';
    var html = buildStandaloneHtml(scenes, title);
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = (title.replace(/\s+/g, '_') || 'quiz') + '_大决战.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// ============ SECTION 11: UTILITIES (Model, FileUpload, Setup) ============
async function detectModels() {
    var sel = document.getElementById('model-select'), status = document.getElementById('model-status');
    try {
        var res = await fetch(WORKER_URL + '/models');
        var data = await res.json();
        sel.innerHTML = '';
        if (data.models) {
            data.models.forEach(function(m) {
                var opt = document.createElement('option');
                opt.value = m.name; opt.textContent = m.displayName || m.name;
                sel.appendChild(opt);
            });
        }
        if (sel.options.length > 0) { sel.selectedIndex = 0; selectedModel = sel.value; status.innerText = '✅ AI 服务连接成功'; sel.style.display = 'block'; }
        else throw new Error('No models');
    } catch (e) {
        console.warn('Model detection failed', e);
        status.innerText = '⚠️ 自动连接失败，使用内置线路';
        sel.innerHTML = '';
        ['models/gemini-2.5-flash','models/gemini-2.5-pro','models/gemini-2.0-flash','models/gemini-1.5-flash','models/gemini-1.5-pro'].forEach(function(m) {
            var opt = document.createElement('option'); opt.value = m; opt.textContent = m.replace('models/',''); sel.appendChild(opt);
        });
        sel.selectedIndex = 0; selectedModel = sel.value; sel.style.display = 'block';
    }
}

function adjustDiffCount(diff, delta) {
    var input = document.getElementById(diff + '-count');
    input.value = Math.max(0, Math.min(30, parseInt(input.value || 0) + delta));
    validateDiffSum();
}

function validateDiffSum() {
    var total = parseInt(document.getElementById('q-count-input').value);
    var easy = parseInt(document.getElementById('easy-count').value || 0);
    var medium = parseInt(document.getElementById('medium-count').value || 0);
    var hard = parseInt(document.getElementById('hard-count').value || 0);
    var sum = easy + medium + hard;
    var errorEl = document.getElementById('diff-sum-error');
    if (sum !== total) {
        errorEl.classList.remove('hidden');
        errorEl.innerText = '⚠️ 当前总和 ' + sum + '，需等于总题数 ' + total + '（' + (sum < total ? '还差 ' + (total-sum) + ' 题' : '多出 ' + (sum-total) + ' 题') + '）';
    } else {
        errorEl.classList.add('hidden');
    }
}

async function extractPptxText(file) {
    var zip = new JSZip();
    var zipContent = await zip.loadAsync(file);
    var text = '';
    var slideFiles = Object.keys(zipContent.files).filter(function(name) { return name.startsWith('ppt/slides/slide') && name.endsWith('.xml'); }).sort();
    for (var i = 0; i < slideFiles.length; i++) {
        var slideXml = await zipContent.file(slideFiles[i]).async('text');
        var matches = slideXml.match(/<a:t>([^<]*)<\/a:t>/g) || [];
        matches.forEach(function(match) { var content = match.replace(/<\/?a:t>/g, ''); if (content.trim()) text += content + '\n'; });
    }
    return text;
}

async function handleFileUpload(input) {
    var file = input.files[0]; if (!file) return;
    try {
        var statusEl = document.getElementById('upload-status');
        statusEl.classList.remove('hidden');
        if (file.type === 'application/pdf') {
            var arrayBuffer = await file.arrayBuffer();
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
            var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            var fullText = '';
            for (var i = 1; i <= pdf.numPages; i++) {
                var page = await pdf.getPage(i);
                var content = await page.getTextContent();
                fullText += content.items.map(function(item) { return item.str; }).join(' ') + '\n';
            }
            document.getElementById('source-text').value = fullText;
        } else if (file.name.endsWith('.docx')) {
            var ab = await file.arrayBuffer();
            var result = await mammoth.extractRawText({ arrayBuffer: ab });
            document.getElementById('source-text').value = result.value;
        } else if (file.name.endsWith('.pptx')) {
            var t = await extractPptxText(file);
            document.getElementById('source-text').value = t;
        }
        statusEl.classList.add('hidden');
    } catch (e) { alert('文档解析失败：' + e.message); document.getElementById('upload-status').classList.add('hidden'); }
}

// ============ SECTION 12: KEYBOARD + INIT ============
document.addEventListener('keydown', function(e) {
    if (battleState.phase !== 'battle' && document.getElementById('battle-view').classList.contains('hidden')) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    if (e.key === 'q' || e.key === 'Q') { e.preventDefault(); handleBuzzer('left'); }
    else if (e.key === 'p' || e.key === 'P') { e.preventDefault(); handleBuzzer('right'); }
    else if (e.key === '1') { e.preventDefault(); if (battleState.timerPhase === 'answering' && !turnOverlayActive) handleAnswerChoice(0); }
    else if (e.key === '2') { e.preventDefault(); if (battleState.timerPhase === 'answering' && !turnOverlayActive) handleAnswerChoice(1); }
    else if (e.key === '3') { e.preventDefault(); if (battleState.timerPhase === 'answering' && !turnOverlayActive) handleAnswerChoice(2); }
    else if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        var noteEl = document.getElementById('battle-note');
        if (noteEl && !noteEl.classList.contains('hidden')) proceedAfterRound();
    }
});

window.onload = function() {
    var style = localStorage.getItem('quiz_style') || 'tech';
    document.body.className = 'theme-' + style;
    detectModels();
    loadSettings();
    // Auto-save config
    document.querySelectorAll('#setup-view input, #setup-view select, #setup-view textarea').forEach(function(el) {
        el.addEventListener('change', saveSettings);
        el.addEventListener('input', saveSettings);
    });
};

function saveSettings() {
    try {
        var s = {
            qCount: document.getElementById('q-count-input').value,
            easyCount: document.getElementById('easy-count').value,
            mediumCount: document.getElementById('medium-count').value,
            hardCount: document.getElementById('hard-count').value,
            shuffleDifficulty: document.getElementById('shuffle-difficulty').checked,
            timerEnabled: document.getElementById('timer-enabled').checked,
            timerSeconds: document.getElementById('timer-seconds-input').value,
            answerSeconds: document.getElementById('answer-seconds-input').value,
            allowRepeat: document.getElementById('allow-repeat').checked,
            studentList: document.getElementById('student-list').value,
            sourceText: document.getElementById('source-text').value
        };
        localStorage.setItem('quiz_battle_settings', JSON.stringify(s));
    } catch (e) {}
}

function loadSettings() {
    try {
        var raw = localStorage.getItem('quiz_battle_settings');
        if (!raw) return;
        var s = JSON.parse(raw);
        if (s.qCount) document.getElementById('q-count-input').value = s.qCount;
        if (s.easyCount) document.getElementById('easy-count').value = s.easyCount;
        if (s.mediumCount) document.getElementById('medium-count').value = s.mediumCount;
        if (s.hardCount) document.getElementById('hard-count').value = s.hardCount;
        if (s.shuffleDifficulty !== undefined) document.getElementById('shuffle-difficulty').checked = s.shuffleDifficulty;
        if (s.timerEnabled !== undefined) document.getElementById('timer-enabled').checked = s.timerEnabled;
        if (s.timerSeconds) document.getElementById('timer-seconds-input').value = s.timerSeconds;
        if (s.answerSeconds) document.getElementById('answer-seconds-input').value = s.answerSeconds;
        if (s.allowRepeat !== undefined) document.getElementById('allow-repeat').checked = s.allowRepeat;
        if (s.studentList) document.getElementById('student-list').value = s.studentList;
        if (s.sourceText) document.getElementById('source-text').value = s.sourceText;
        document.getElementById('q-count-val').innerText = s.qCount || '10';
        document.getElementById('diff-total-target').innerText = s.qCount || '10';
        document.getElementById('timer-val').innerText = s.timerSeconds || '20';
        document.getElementById('answer-val').innerText = s.answerSeconds || '5';
        if (!s.timerEnabled) {
            document.getElementById('timer-group').classList.add('hidden');
        }
        validateDiffSum();
    } catch (e) {}
}
</script>
